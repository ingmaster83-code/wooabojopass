name: 데이터 자동 갱신

on:
  schedule:
    - cron: '0 17 * * *'  # 매일 새벽 2시 KST (UTC 17시)
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r scripts/requirements.txt

      - name: 데이터 캐시 복원
        uses: actions/cache@v4
        with:
          path: data/
          key: bojopass-data-v2-${{ runner.os }}-${{ hashFiles('scripts/fetch_data.py') }}

      - name: 한글 폰트 설치
        run: sudo apt-get install -y fonts-noto-cjk

      - name: 데이터 수집
        run: python scripts/fetch_data.py
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          PYTHONUTF8: "1"

      - name: OG 이미지 생성
        run: python scripts/create_og_image.py

      - name: 페이지 생성
        run: python scripts/generate_pages.py
        env:
          PYTHONUTF8: "1"

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "자동 데이터 갱신 $(date +'%Y-%m-%d')"
          git push
