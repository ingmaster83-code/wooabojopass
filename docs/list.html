<script>
// ── 상태 ─────────────────────────────────────────
let ALL_ITEMS = [];
let filtered  = [];
let page      = 0;
const PER     = 50;

const state = { source: 'all', target: 'all', field: 'all', status: 'all', q: '' };

// ── 데이터 로드 ───────────────────────────────────
async function loadData() {
  try {
    const [central, local] = await Promise.all([
      fetch('data/central.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('data/local.json').then(r => r.ok ? r.json() : []).catch(() => []),
    ]);

    ALL_ITEMS = [...central, ...local].map(enrichItem);

    document.getElementById('cntAll').textContent     = ALL_ITEMS.length.toLocaleString();
    document.getElementById('cntCentral').textContent = central.length.toLocaleString();
    document.getElementById('cntLocal').textContent   = local.length.toLocaleString();

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('cardGrid').style.display     = 'grid';

    applyFilters();
  } catch(e) {
    document.getElementById('loadingState').innerHTML =
      '<p style="color:var(--text-muted);">데이터를 불러오지 못했어요. 잠시 후 다시 시도해주세요.</p>';
  }
}

// ── 아이템 보강 ────────────────────────────────────
function enrichItem(item) {
  const slug = slugify(item.name || item.id || '');
  const { period, cls, label, daysLeft } = calcDday(item.apply_end);
  const targets = detectTargets(item);
  const fields  = detectFields(item);
  return { ...item, slug, apply_period: period, dday_class: cls, dday_label: label, daysLeft, targets, fields };
}

function slugify(s) {
  return String(s).trim().replace(/[^\w\s가-힣]/g, '-').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '');
}

function calcDday(end) {
  if (!end) return { period: '연중 상시', cls: 'badge-dday-ongoing', label: '상시', daysLeft: 9999 };
  const s = String(end).replace(/[-\.]/g, '').slice(0, 8);
  if (s.length < 8) return { period: end, cls: 'badge-dday-safe', label: '확인', daysLeft: 9999 };
  const endDate = new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
  const today   = new Date(); today.setHours(0,0,0,0);
  const diff    = Math.round((endDate - today) / 86400000);
  const fmt     = `~${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
  if (diff < 0)  return { period: fmt, cls: 'badge-dday-closed',  label: '마감',    daysLeft: diff };
  if (diff <= 3) return { period: fmt, cls: 'badge-dday-danger',  label: `D-${diff}`, daysLeft: diff };
  if (diff <= 30)return { period: fmt, cls: 'badge-dday-warn',    label: `D-${diff}`, daysLeft: diff };
  return           { period: fmt, cls: 'badge-dday-safe',  label: `D-${diff}`, daysLeft: diff };
}

const TARGET_KW = {
  '청년':   ['청년','대학생','만 19','만19'],
  '중장년': ['중장년','중년','만 40','4050'],
  '노인':   ['노인','어르신','고령','만 65','만65'],
  '장애인': ['장애인','장애'],
  '임산부': ['임산부','임신','출산','산모','영아'],
  '다자녀': ['다자녀','자녀','육아','아동','보육'],
  '한부모': ['한부모','편부','편모','미혼모'],
  '소상공인':['소상공인','자영업','중소기업','창업'],
};
const FIELD_KW = {
  '주거': ['주거','주택','임대','전세','월세'],
  '취업': ['취업','일자리','고용','구직'],
  '육아': ['육아','보육','아동','어린이집','양육'],
  '의료': ['의료','건강','치료','병원','의료비'],
  '교육': ['교육','학습','장학','학비'],
  '창업': ['창업','스타트업','창업자금'],
  '금융': ['금융','대출','이자','융자','저축','적금'],
  '복지': ['복지','생활','생계','기초','수급'],
};

function detectTargets(item) {
  const txt = [item.name, item.target_summary, item.categories, item.life_cycle, item.summary].join(' ').toLowerCase();
  return Object.keys(TARGET_KW).filter(t => TARGET_KW[t].some(k => txt.includes(k.toLowerCase())));
}
function detectFields(item) {
  const txt = [item.name, item.categories, item.summary, item.amount_summary].join(' ').toLowerCase();
  return Object.keys(FIELD_KW).filter(f => FIELD_KW[f].some(k => txt.includes(k.toLowerCase())));
}

// ── 필터 적용 ──────────────────────────────────────
function applyFilters() {
  const q = state.q.toLowerCase();

  filtered = ALL_ITEMS.filter(item => {
    if (state.source !== 'all' && item.source !== state.source) return false;
    if (state.target !== 'all' && !item.targets.includes(state.target)) return false;
    if (state.field  !== 'all' && !item.fields.includes(state.field))   return false;
    if (state.status === 'ongoing' && item.daysLeft < 0) return false;
    if (state.status === 'soon'    && (item.daysLeft < 0 || item.daysLeft > 30)) return false;
    if (q && !`${item.name} ${item.dept} ${item.summary}`.toLowerCase().includes(q)) return false;
    return true;
  });

  // 정렬
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'deadline') filtered.sort((a,b) => a.daysLeft - b.daysLeft);
  else if (sort === 'name') filtered.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  page = 0;
  document.getElementById('cardGrid').innerHTML = '';
  document.getElementById('resultCount').innerHTML =
    `총 <strong>${filtered.length.toLocaleString()}</strong>개 지원금`;
  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('cardGrid');
  const chunk = filtered.slice(page * PER, (page + 1) * PER);
  chunk.forEach(item => { grid.insertAdjacentHTML('beforeend', renderCard(item)); });
  page++;
  const wrap = document.getElementById('loadMoreWrap');
  wrap.style.display = page * PER < filtered.length ? 'block' : 'none';
}

function renderCard(item) {
  const srcBadge = item.source === 'central' ? '<span class="badge badge-source-central">중앙부처</span>' : '<span class="badge badge-source-local">지자체</span>';
  const amount   = String(item.amount_summary || '').slice(0, 28);
  const summary  = String(item.summary || '').slice(0, 70);
  return `<a href="jiwon/${item.slug}.html" class="jiwon-card">
  <div class="card-top">
    <div class="card-badges">${srcBadge}</div>
    <span class="badge-dday ${item.dday_class}">${item.dday_label}</span>
  </div>
  <div class="card-title">${item.name || ''}</div>
  <div class="card-dept">${item.dept || ''}</div>
  <div class="card-info">
    <div class="card-info-item">
      <span class="card-info-label">지원내용</span>
      <span class="card-info-value">${amount || '-'}</span>
    </div>
    <div class="card-info-item">
      <span class="card-info-label">신청기간</span>
      <span class="card-info-value">${item.apply_period}</span>
    </div>
  </div>
  <div class="card-target">${summary}</div>
  <div class="card-btn">자세히 보기 →</div>
</a>`;
}

// ── 이벤트 바인딩 ──────────────────────────────────
document.querySelectorAll('#sourceFilter .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sourceFilter .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.source = btn.dataset.source;
    applyFilters();
  });
});
document.querySelectorAll('#targetFilter .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#targetFilter .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.target = btn.dataset.target;
    applyFilters();
  });
});
document.querySelectorAll('#fieldFilter .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#fieldFilter .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.field = btn.dataset.field;
    applyFilters();
  });
});
document.querySelectorAll('#statusFilter .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#statusFilter .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.status = btn.dataset.status;
    applyFilters();
  });
});
document.getElementById('sortSelect').addEventListener('change', applyFilters);
document.getElementById('loadMoreBtn').addEventListener('click', renderPage);

let searchTimer;
document.getElementById('listSearch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.q = e.target.value; applyFilters(); }, 250);
});
document.getElementById('globalSearch').addEventListener('input', e => {
  state.q = e.target.value;
  document.getElementById('listSearch').value = e.target.value;
  applyFilters();
});

// URL 파라미터 처리 (?q=검색어&target=청년)
const params = new URLSearchParams(location.search);
if (params.get('q'))      { state.q = params.get('q'); document.getElementById('listSearch').value = state.q; }
if (params.get('target')) { state.target = params.get('target'); document.querySelector(`[data-target="${state.target}"]`)?.classList.add('active'); }
